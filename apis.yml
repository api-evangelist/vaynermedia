name: VaynerMedia
description: >-
  VaynerMedia is an integrated strategy, creative, and media agency founded by Gary
  Vaynerchuk, positioning itself as "The Modern Agency of Record" with social media
  at the center of its practice. Headquartered in New York with roughly 2,000 employees
  across offices in Los Angeles, Chattanooga, Chicago, Miami, Toronto, Amsterdam, London,
  Mexico City, Sydney, Mumbai, Tokyo, Kuala Lumpur, Singapore, and Bangkok, the agency
  serves clients including Bose, Coach, Diageo, Duracell, Indeed, Jimmy John's, Meta,
  Mondelez, NatWest, PepsiCo, Tinder, and Wingstop. VaynerMedia is the flagship brand
  of holding company VaynerX, whose portfolio also includes Gallery Media Group, ChukMedia,
  Tamara Group, Eva Nosidam Productions, VaynerSpeakers, Tingley Lane, and the Marketing
  for the Now podcast. VaynerMedia is a services agency, not an API or platform company —
  it does not publish a developer API, SDK, or public technology product, and its public
  GitHub presence (github.com/vaynermedia and github.com/vaynerx) consists primarily of
  forked open source libraries and internal build tooling rather than maintained API products.
